  <header class="site-header">
    <div class="container header-inner">
      <a href="{index_href}" class="branding">
        <div class="branding-wordmark-row">
          <img src="{logo_src}" alt="" class="brand-logo-icon" width="48" height="48" decoding="async" aria-hidden="true">
          <img src="{wordmark_src}" alt="{store_name}" class="brand-wordmark" width="560" height="48" decoding="async">
        </div>
        <span class="branding-tagline">{tagline}</span>
      </a>
      <div class="header-actions">
        <a class="pill" href="{catalog_href}">Каталог</a>
        <a class="pill" href="{guides_href}">Гид по свечам</a>
        <a class="pill" href="{faq_href}"{faq_extra}>Вопросы и ответы</a>
        <button class="cart-toggle" data-cart-link>Корзина · <span data-cart-count>0</span></button>
      </div>
    </div>
  </header>
